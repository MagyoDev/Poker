name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Firebase config file
        run: |
          python3 - <<'EOF'
          import os, json
          raw = os.environ['FIREBASE_CONFIG']
          # Accept both plain JSON object and stringified JSON
          cfg = json.loads(raw) if raw.strip().startswith('{') else json.loads(json.loads(raw))
          # Write as a plain JSON file — no JS module syntax, no global variable
          # The file is never in the repo; it only exists in the deployed artifact
          with open('__fb__.js', 'w') as f:
              f.write(json.dumps(cfg))
          print("Config file generated OK")
          EOF
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
